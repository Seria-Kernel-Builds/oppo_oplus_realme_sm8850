      - name: ж·»еҠ SUSFS й…ҚзҪ®йЎ№
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> ./common/arch/arm64/configs/gki_defconfig
          
      - name: ж·»еҠ  KSU & е…¶д»–й…ҚзҪ®йЎ№
        run: |
          cd kernel_workspace
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' && ( "${{ github.event.inputs.ksu_type }}" == "sukisu" || "${{ github.event.inputs.ksu_type }}" == "resukisu" ) ]]; then
            echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          if [[ "${{ github.event.inputs.susfs_enable }}" == "false" ]]; then
            echo "CONFIG_KSU_SUSFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          # ж·»еҠ еҜ№ Mountify (backslashxx/mountify) жЁЎеқ—зҡ„ж”ҜжҢҒ
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            echo "CONFIG_ZSMALLOC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4K=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_CRYPTO_842=y" >> ./common/arch/arm64/configs/gki_defconfig
            #д»ҘдёӢй…ҚзҪ®йҖүйЎ№з”ЁдәҺзј–иҜ‘zramжЁЎеқ—пјҢејҖеҗҜдёҺеҗҰдёҚеҪұе“ҚеҶ…ж ёзј–иҜ‘
            echo "CONFIG_ZRAM_BACKEND_LZ4HC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_ZRAM_BACKEND_LZ4K=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_ZRAM_BACKEND_LZ4KD=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_ZRAM_BACKEND_842=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          # ејҖеҗҜO2зј–иҜ‘дјҳеҢ–й…ҚзҪ®
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig
          # зҰҒз”Ё defconfig жЈҖжҹҘ
          sed -i 's/check_defconfig//' ./common/build.config.gki
          #и·іиҝҮе°Ҷuapiж ҮеҮҶеӨҙе®үиЈ…еҲ° usr/include зӣ®еҪ•зҡ„дёҚеҝ…иҰҒж“ҚдҪңпјҢиҠӮзңҒзј–иҜ‘ж—¶й—ҙ
          echo "CONFIG_HEADERS_INSTALL=n" >> ./common/arch/arm64/configs/gki_defconfig
          # 6.12еҶ…ж ёRustй…ҚзҪ®
          echo "CONFIG_RUST=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ANDROID_BINDER_IPC_RUST=m" >> ./common/arch/arm64/configs/gki_defconfig
          
      - name: еҗҜз”ЁзҪ‘з»ңеҠҹиғҪеўһејәдјҳеҢ–й…ҚзҪ®
        if: inputs.better_net
        run: |
          cd kernel_workspace
          #ејҖеҗҜеўһејә Netfilter йҳІзҒ«еўҷжү©еұ•жЁЎеқ—,ж”ҜжҢҒеҹәдәҺең°еқҖзұ»еһӢзҡ„еҢ№й…Қи§„еҲҷ,еҗҜз”Ё IP йӣҶеҗҲж”ҜжҢҒ,жҸҗй«ҳйҳІзҒ«еўҷи§„еҲҷзҒөжҙ»жҖ§,ж”ҜжҢҒжӣҙеӨҚжқӮзҡ„жөҒйҮҸиҝҮж»Өзӯ–з•Ҙ
          echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NETFILTER_XT_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          #еҗҜз”Ё IP йӣҶжЎҶжһ¶еҸҠе…¶еӨҡз§Қж•°жҚ®з»“жһ„е®һзҺ°,жҸҗдҫӣй«ҳж•Ҳзҡ„еӨ§и§„жЁЎ IP ең°еқҖз®ЎзҗҶ,жҸҗй«ҳйҳІзҒ«еўҷи§„еҲҷеӨ„зҗҶж•ҲзҺҮ,еҮҸе°‘еҶ…еӯҳеҚ з”Ё
          echo "CONFIG_IP_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_MAX=65534" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_MAC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_SET_LIST_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
          #еҗҜз”Ё IPv6 зҪ‘з»ңең°еқҖиҪ¬жҚў
          echo "CONFIG_IP6_NF_NAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y" >> ./common/arch/arm64/configs/gki_defconfig
          #з”ұдәҺйғЁеҲҶжңәеһӢзҡ„vintfе…је®№жҖ§жЈҖжөӢи§„еҲҷпјҢеңЁејҖеҗҜCONFIG_IP6_NF_NATеҗҺејҖжңәдјҡеҮәзҺ°"жӮЁзҡ„и®ҫеӨҮеҶ…йғЁеҮәзҺ°дәҶй—®йўҳгҖӮиҜ·иҒ”зі»жӮЁзҡ„и®ҫеӨҮеҲ¶йҖ е•ҶдәҶи§ЈиҜҰжғ…гҖӮ"зҡ„жҸҗзӨәпјҢж•…ж·»еҠ дёҖдёӘй…ҚзҪ®дҝ®еӨҚиЎҘдёҒпјҢеңЁзј–иҜ‘еҶ…ж ёж—¶йҡҗи—ҸCONFIG_IP6_NF_NAT=yдҪҶдёҚеҪұе“ҚеҜ№еә”еҠҹиғҪзј–иҜ‘
          cd common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/config.patch
          patch -p1 -F 3 < config.patch || true

      - name: ж·»еҠ  BBR зӯүдёҖзі»еҲ—жӢҘеЎһжҺ§еҲ¶з®—жі•
        run: |
          if [[ "${{ github.event.inputs.bbr_enable }}" != "false" ]]; then
            echo "жӯЈеңЁж·»еҠ BBRзӯүжӢҘеЎһжҺ§еҲ¶з®—жі•..."
            cd kernel_workspace
            #ејҖеҗҜTCPжӢҘеЎһжҺ§еҲ¶з®—жі•жҺ§еҲ¶еҷЁпјҲеҝ…йңҖпјү
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
            ################################################################################################################################
            # BBRпјҡеҹәдәҺй“ҫи·Ҝе®№йҮҸзҡ„д»ЈиЎЁжӢҘеЎһжҺ§еҲ¶з®—жі•пјҢдёҚеҶҚдҪҝз”ЁдёўеҢ…гҖҒе»¶ж—¶зӯүдҝЎеҸ·еҺ»иЎЎйҮҸжӢҘеЎһжҳҜеҗҰеҸ‘з”ҹпјҢиҖҢжҳҜзӣҙжҺҘеҜ№зҪ‘з»ңе»әжЁЎжқҘеә”еҜ№гҖҒйҒҝе…Қзңҹе®һзҡ„зҪ‘з»ңжӢҘеЎһпјӣ
            # е…·жңүй«ҳеҗһеҗҗгҖҒдҪҺе»¶иҝҹгҖҒжҠ—дёўеҢ…зҡ„зү№зӮ№пјҢдҪҶеңЁжүӢжңәдёҠдҪҝз”Ёж—¶з”ұдәҺжҢҒз»ӯжҺўжөӢеёҰе®Ҫ/RTTгҖҒй«ҳйў‘и®Ўз®—дёҺеҸ‘еҢ…еўһеҠ  CPU е’Ңе°„йў‘жЁЎеқ—еҠҹиҖ—пјҢдјҡеўһеҠ иҖ—з”өеҸҠеҸ‘зғӯпјӣ
            # дё”з§»еҠЁеҹәз«ҷзј“еҶІеҢәж·ұеәҰйҖҡеёёиҫғе°ҸпјҲ~50msпјүпјҢBBR зҡ„еёҰе®ҪжҺўжөӢйҳ¶ж®өпјҲProbeRTTпјүиҝҮеәҰйҷҚзӘ—еҸҜиғҪеҜјиҮҙеҗһеҗҗйҮҸйӘӨйҷҚпјҢдё”зҪ‘з»ңеҲҮжҚўпјҲWiFiвҶ’5Gпјүж—¶йңҖйҮҚж–°
            # жҺўжөӢеҸӮж•°пјҢеҸҚиҖҢеўһеҠ е»¶иҝҹжҲ–еҜјиҮҙйҖҹзҺҮжҢҜиҚЎпјҲзҹӯжҡӮеҚЎйЎҝпјүпјҢдё”еӯҳеңЁ RTT дёҚе…¬е№іжҖ§пјҢдёҺеҹәдәҺдёўеҢ…зҡ„жөҒз«һдәүж—¶еҸҜиғҪиҝҮдәҺејәеҠҝпјҢеңЁж··еҗҲзҪ‘з»ңзҺҜеўғдёӯ
            #пјҲеҰӮ BBR + CUBIC е…ұеӯҳпјүпјҢBBR дјҡжҠўеҚ жӣҙеӨҡе…¶д»–иҪҜд»¶зҡ„еёҰе®ҪпјҢйҷҚдҪҺе…¶д»–еә”з”Ёзҡ„е…¬е№іжҖ§пјҲеҰӮеҗҺеҸ°иҪҜд»¶жӣҙж–°еҪұе“ҚеүҚеҸ°и§Ҷйў‘ж’ӯж”ҫпјүгҖӮ
            # еӣ жӯӨпјҢиҷҪз„¶BBRеҸҜд»Ҙжҳҫи‘—еҮҸе°‘жҺ’йҳҹе»¶иҝҹпјҢжҠ—дёўеҢ…иғҪеҠӣејәпјҢеёҰе®ҪеҲ©з”ЁзҺҮй«ҳпјҢдҪҶз”ұдәҺе…¶дјҡеўһеҠ иҖ—з”өпјҢдё”жҳ“еҜјиҮҙзҪ‘з»ңйҖҹзҺҮжіўеҠЁпјҢж•…е®үеҚ“зі»з»ҹй»ҳи®ӨдёҚдҪҝз”Ё
            # BBRжӢҘеЎһз®—жі•пјҢиҖҢжҳҜдҪҝз”ЁеңЁеҗһеҗҗйҮҸгҖҒзЁіе®ҡжҖ§гҖҒе…је®№жҖ§гҖҒиғҪж•Ҳд№Ӣй—ҙеҸ–еҫ—жңҖдҪіе№іиЎЎзҡ„CUBICз®—жі•гҖӮеңЁејҖеҗҜBBRеүҚпјҢиҜ·иҖғиҷ‘иҮӘе·ұжҳҜеҗҰзңҹзҡ„жңүдҪҝз”ЁBBRзҡ„еҝ…иҰҒгҖӮ
            ################################################################################################################################
            echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
            #CUBICпјҡе®үеҚ“зҡ„й»ҳи®ӨTCPжӢҘеЎһжҺ§еҲ¶з®—жі•пјҢеңЁеҗһеҗҗйҮҸгҖҒзЁіе®ҡжҖ§гҖҒе…је®№жҖ§гҖҒиғҪж•Ҳд№Ӣй—ҙеҸ–еҫ—жңҖдҪіе№іиЎЎпјҢе…·жңүй«ҳе…је®№жҖ§дёҺе…¬е№іжҖ§гҖҒжҠ—зҪ‘з»ңжіўеҠЁжҖ§ејәгҖҒдҪҺи®Ўз®—ејҖй”Җзҡ„зү№зӮ№пјҢжҳҜз»қеӨ§йғЁеҲҶз§»еҠЁеңәжҷҜзҡ„дјҳе…ҲйҖүжӢ©
            echo "CONFIG_TCP_CONG_CUBIC=y" >> ./common/arch/arm64/configs/gki_defconfig
            #VEGASпјҡеҹәдәҺж—¶е»¶зҡ„жӢҘеЎһжҺ§еҲ¶з®—жі•д№ӢдёҖпјҢе°Ҷеӣһи·Ҝе“Қеә”ж—¶й—ҙпјҲRound Trip TimeпјҢRTTпјүеўһеҠ и§ҶдёәеҮәзҺ°жӢҘеЎһпјҢеўһеҠ ж—¶еўһеӨ§жӢҘеЎһзӘ—еҸЈпјҢеҮҸе°Ҹж—¶еҮҸе°ҸжӢҘеЎһзӘ—еҸЈ
            echo "CONFIG_TCP_CONG_VEGAS=y" >> ./common/arch/arm64/configs/gki_defconfig
            #New VegasпјҡVegas з®—жі•зҡ„ж”№иҝӣзүҲпјҢдјҳеҢ–дәҶ RTT жөӢйҮҸе’Ңз«һдәүе…¬е№іжҖ§пјҢеҸҜд»ҘжӣҙеҮҶзЎ®ең°жЈҖжөӢжӢҘеЎһпјҢдёҺ Reno/CUBIC е…ұеӯҳиғҪеҠӣжҸҗеҚҮ
            echo "CONFIG_TCP_CONG_NV=y" >> ./common/arch/arm64/configs/gki_defconfig
            #Westwood+пјҡеҹәдәҺеёҰе®Ҫдј°и®ЎпјҲACK еҲ°иҫҫзҺҮпјүеҠЁжҖҒи®ҫзҪ®жӢҘеЎһзӘ—еҸЈе’Ңж…ўеҗҜеҠЁйҳҲеҖјпјӣеҝ«йҖҹжҒўеӨҚпјҢйҖӮеҗҲж— зәҝзҪ‘з»ңпјҲеҢәеҲҶжӢҘеЎһдёўеҢ…дёҺж— зәҝдёўеҢ…пјү
            echo "CONFIG_TCP_CONG_WESTWOOD=y" >> ./common/arch/arm64/configs/gki_defconfig
            #HTCPпјҡдёҖз§ҚеҹәдәҺжҚҹеӨұзҡ„з®—жі•пјҢдҪҝз”Ё AIMD жқҘжҺ§еҲ¶жӢҘеЎһзӘ—еҸЈпјҢж №жҚ® RTT еҠЁжҖҒи°ғж•ҙеўһй•ҝеӣ еӯҗпјҢз»“еҗҲе»¶иҝҹе’ҢдёўеҢ…дҝЎеҸ·пјҢй’ҲеҜ№й«ҳе»¶иҝҹзҡ„й«ҳйҖҹзҪ‘з»ңиҝӣиЎҢдјҳеҢ–
            echo "CONFIG_TCP_CONG_HTCP=y" >> ./common/arch/arm64/configs/gki_defconfig
            #brutalпјҡдёҖз§ҚйҖҡиҝҮдё»еҠЁжҺўжөӢ + жҝҖиҝӣжҠўеҚ жңҖеӨ§еҢ–еҗһеҗҗйҮҸзҡ„жӢҘеЎһз®—жі•пјҢж— жӢҘеЎһзӘ—еҸЈдёҠйҷҗпјҢиҪ»еәҰдёўеҢ…пјҲ<20%пјүдёҚйҷҚзӘ—пјҢйҒҝе…Қзұ»дјј BBR зҡ„ ProbeRTT йҳ¶ж®өпјҢ
            #жҢҒз»ӯз»ҙжҢҒй«ҳеҸ‘йҖҒйҖҹзҺҮпјҢдёҺ Reno/CUBIC е…ұеӯҳж—¶пјҢBrutal еҸҜйҖҡиҝҮй«ҳйў‘еҸ‘еҢ…жҠўеҚ  90%+ еёҰе®ҪпјҢйҖӮз”ЁдәҺй«ҳдёўеҢ…ејұзҪ‘зҺҜеўғпјҲеҰӮе…¬е…ұ Wi-FiгҖҒиңӮзӘқзҪ‘з»ңпјүеҸҠ
            #зӣҙж’ӯжҺЁжөҒгҖҒдә‘жёёжҲҸдёҠиЎҢй“ҫи·ҜзӯүйңҖдјҳе…ҲдҝқиҜҒеҗһеҗҗйҮҸиҖҢйқһе»¶иҝҹж•Ҹж„ҹзҡ„еңәжҷҜпјҢжҸҗеҚҮејұзҪ‘еҗһеҗҗжҖ§иғҪпјҢеҜ№жҠ—иҝҗиҗҘе•Ҷ QoS йҷҗйҖҹгҖӮдҪҶз”ұдәҺTCP Brutal д»…еңЁеә”з”ЁзЁӢеәҸ
            #еҜ№жҜҸдёӘ TCP иҝһжҺҘи®ҫзҪ®еёҰе®ҪеҸӮж•°д№ӢеҗҺжүҚиғҪжӯЈеёёе·ҘдҪңпјҢз»қеӨ§йғЁеҲҶе®үеҚ“еә”з”ЁйғҪдёҚж”ҜжҢҒиҜҘж“ҚдҪңпјҢж•…иҜ·еӢҝе°Ҷ TCP Brutal и®ҫзҪ®жҲҗй»ҳи®ӨжӢҘеЎһжҺ§еҲ¶з®—жі•гҖӮ
            echo "CONFIG_TCP_CONG_BRUTAL=y" >> ./common/arch/arm64/configs/gki_defconfig
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "жӯЈеңЁе°ҶBBRи®ҫдёәй»ҳи®ӨжӢҘеЎһжҺ§еҲ¶з®—жі•..."
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
            else
              echo "CONFIG_DEFAULT_TCP_CONG=cubic" >> ./common/arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: еҗҜз”ЁADIOS IOи°ғеәҰеҷЁ
        if: inputs.adios_enable
        run: |
          echo "жӯЈеңЁеҗҜз”ЁADIOS IOи°ғеәҰеҷЁ(е°ҶжҲӘжӯўж—¶й—ҙдјҳе…Ҳи°ғеәҰз®—жі•дёҺеҹәдәҺиҮӘдё»еӯҰд№ зҡ„иҮӘйҖӮеә”е»¶иҝҹжҺ§еҲ¶з®—жі•зӣёз»“еҗҲ, йҷҚдҪҺI/Oе»¶иҝҹ)вҖҰ"
          cd kernel_workspace
          echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: еҗҜз”ЁRe-Kernelж”ҜжҢҒ
        if: inputs.rekernel_enable
        run: |
          echo "жӯЈеңЁеҗҜз”ЁRe-Kernelж”ҜжҢҒ(з”ЁдәҺдёҺFreezer,NoActiveзӯүиҪҜд»¶й…ҚеҗҲдҪҝз”Ё,жҸҗеҚҮеҶ»з»“еҗҺеҸ°иғҪеҠӣ)вҖҰ"
          cd kernel_workspace
          echo "CONFIG_REKERNEL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_REKERNEL_NETWORK=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: еҗҜз”ЁеҶ…ж ёзә§еҹәеёҰдҝқжҠӨ
        if: inputs.baseband_guard
        run: |
          echo "жӯЈеңЁеҗҜз”ЁеҗҜз”ЁеҶ…ж ёзә§еҹәеёҰдҝқжҠӨж”ҜжҢҒвҖҰ"
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common
          curl -sSL https://github.com/Seria-Kernel-Builds/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: ж·»еҠ еҲ¶дҪңеҗҚз§°
        run: |
          cd kernel_workspace
          echo "жӣҝжҚўеҶ…ж ёзүҲжң¬еҗҺзјҖ..."
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            echo "еҪ“еүҚеҶ…ж ёзүҲжң¬еҗҺзјҖпјҡ${{ github.event.inputs.kernel_suffix }}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ github.event.inputs.kernel_suffix }}\"|" "$f"
            done
            sudo sed -i 's/-4k/-${{ github.event.inputs.KERNEL_SUFFIX }}/g' ./common/arch/arm64/configs/gki_defconfig
          else
            echo "еҪ“еүҚеҶ…ж ёзүҲжң¬еҗҺзјҖпјҡ${{ env.KERNEL_NAME }}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ env.KERNEL_NAME }}\"|" "$f"
            done
            sudo sed -i 's/-4k/-${{ env.KERNEL_NAME }}/g' ./common/arch/arm64/configs/gki_defconfig
          fi
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig
           
      - name: жһ„е»әеҶ…ж ё
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/rust/bin:$PATH"
          export CLANG_DIR="$WORKDIR/kernel_workspace/clang19/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          RUSTC_VERSION="$(rustc -V 2>/dev/null | head -n1)"
          BINDGEN_VERSION="$(bindgen --version 2>/dev/null | head -n1)"
          echo "зј–иҜ‘еҷЁдҝЎжҒҜ:"
          echo "ClangзүҲжң¬: $CLANG_VERSION"
          echo "LLDзүҲжң¬: $LLD_VERSION"
          echo "RustcзүҲжң¬: $RUSTC_VERSION"
          echo "BindgenзүҲжң¬: $BINDGEN_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "paholeзүҲжң¬пјҡжңӘе®үиЈ…" || echo "paholeзүҲжң¬пјҡ$pahole_version"
          
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="3G"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          
          cd kernel_workspace/common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export FAKESTAT="2025-11-27 08:45:40"
          export FAKETIME="@2025-11-27 08:45:40"
          echo "FAKESTAT=$FAKESTAT" >> $GITHUB_ENV
          echo "FAKETIME=$FAKETIME" >> $GITHUB_ENV
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          export REAL_CLANG_PATH="$WORKDIR/kernel_workspace/clang19/bin/clang"
          #еҲӣе»ә CC (зј–иҜ‘еҷЁ) еҢ…иЈ…еҷЁ
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache $REAL_CLANG_PATH "$@"' >> cc-wrapper
          #еҲӣе»ә LD (й“ҫжҺҘеҷЁ) еҢ…иЈ…еҷЁ
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          
          # жөӢиҜ•ж—¶й—ҙеҠ«жҢҒжөӢиҜ•жҳҜеҗҰжӯЈеёёе·ҘдҪң
          echo "--- [Wrapper Test] жӯЈеңЁеҲӣе»әйҖҡз”Ёзҡ„ж—¶й—ҙеҠ«жҢҒжөӢиҜ•и„ҡжң¬ ---"
          echo '#!/bin/bash' > test-wrapper.sh
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> test-wrapper.sh
          echo 'export FAKESTAT="'$FAKESTAT'"' >> test-wrapper.sh
          echo 'export FAKETIME="'$FAKETIME'"' >> test-wrapper.sh
          echo 'echo ">>> Wrapper еҶ…йғЁзҺҜеўғжЈҖжҹҘе®ҢжҜ•."' >> test-wrapper.sh
          echo 'exec "$@"' >> test-wrapper.sh # жү§иЎҢжүҖжңүдј е…Ҙзҡ„еҸӮж•°
          chmod +x test-wrapper.sh
          echo "--- [Wrapper Test] жӯЈеңЁжөӢиҜ• (date) е‘Ҫд»Ө ---"
          ./test-wrapper.sh date
          echo "--- [Wrapper Test] жӯЈеңЁжөӢиҜ• (stat) е‘Ҫд»Ө ---"
          ./test-wrapper.sh stat ./Makefile
          echo "--- [Wrapper Test] жөӢиҜ•е®ҢжҜ• ---"
          chmod +x cc-wrapper ld-wrapper
          echo "--- зј–иҜ‘еүҚзҺҜеўғж—¶й—ҙ: $(LD_PRELOAD=$PRELOAD_LIBS date) ---"
          echo "--- зј–иҜ‘еүҚзҺҜеўғж–Үд»¶ж—¶й—ҙжҲі: ---"
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          
          # 6.12еҶ…ж ёmakeзј–иҜ‘ж ёеҝғй…ҚзҪ®пјҡ
          # 1. йҮҚжҳ е°„зү©зҗҶи·Ҝеҫ„ (з”ұдәҺ6.12еҶ…ж ёеј•е…ҘдәҶRustд»Јз ҒпјҢи®Ўз®—еҶ…ж ёз¬ҰеҸ·зүҲжң¬зҡ„е·Ҙе…·еҸҳжҲҗдәҶgendwarfksymsпјҢиҖҢgendwarfksymsж— жі•жӯЈзЎ®йў„еӨ„зҗҶз»қеҜ№и·Ҝеҫ„пјҢж•…жҲ‘д»¬йңҖиҰҒжүӢеҠЁжҠҠз»қеҜ№и·Ҝеҫ„йҮҚжҳ е°„дёәзӣёеҜ№и·Ҝеҫ„пјҢеҗҰеҲҷеҶ…ж ёз¬ҰеҸ·ж ЎйӘҢеҖјдјҡеӨ§йқўз§ҜеҮәй”ҷ)
          COMMON_REAL_PATH=$(pwd -P)
          ROOT_REAL_PATH=$(dirname "$COMMON_REAL_PATH")
          KCFLAGS+=" -fdebug-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -fmacro-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -ffile-prefix-map=$ROOT_REAL_PATH=."
          # 2. еЈ°жҳҺRustзӯүе·Ҙе…·пјҲжӯӨеӨ„иӢҘдёҚиҝӣиЎҢеЈ°жҳҺпјҢеҶ…ж ёзј–иҜ‘еүҚзҡ„RustзҺҜеўғйў„жЈҖжөӢи„ҡжң¬scripts/rust_is_available.shдјҡжЈҖжөӢеӨұиҙҘпјҢеҜјиҮҙеҶ…ж ёж— жі•жӯЈеёёејҖеҗҜRustд»Јз Ғзј–иҜ‘пјү
          export RUSTC="rustc"
          export BINDGEN="bindgen"
          export CC="clang"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang19/lib"
          # 3. й…ҚзҪ®KCFLAGS
          KCFLAGS+=" -no-canonical-prefixes"
          KCFLAGS+=" -O2"
          KCFLAGS+=" -pipe"
          KCFLAGS+=" -Wno-error"
          KCFLAGS+=" -fno-stack-protector"
          KCFLAGS+=" -D__ANDROID_COMMON_KERNEL__"
          export KCFLAGS
          # 4. й…ҚзҪ®е…¶д»–е·Ҙе…·еҸҠйҖүйЎ№пјҲйқһеҝ…йЎ»пјҢйҳІй”ҷеҶ—дҪҷпјү
          export HOSTCC=clang
          export LD="ld.lld"
          export HOSTLD=ld.lld
          export LLVM=1 LLVM_IAS=1
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm AS=clang READELF=llvm-readelf
          export OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump OBJSIZE=llvm-size STRIP=llvm-strip
          # 5. зј–иҜ‘еүҚиҝҗиЎҢе®ҳж–№зҺҜеўғй…ҚзҪ®и„ҡжң¬
          source "./_setup_env.sh" 2>/dev/null || true
          # дјӘиЈ…еҺҹеҺӮзј–иҜ‘дҝЎжҒҜ
          export KBUILD_BUILD_USER="kleaf"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_TIMESTAMP="Thu Nov 27 08:45:40 UTC 2025"
          # е°Ҷж—¶й—ҙиҪ¬жҚўдёә Unix Epoch ж—¶й—ҙжҲі
          export SOURCE_DATE_EPOCH=1764233140
          #еңЁжһ„е»әеҶ…ж ёзҡ„еҗҢж—¶жё…йҷӨдёҚеҝ…иҰҒзҡ„.NET, Android NDK, Haskell, CodeQLиҝҗиЎҢеә“пјҢжё…зҗҶз©әй—ҙдё”дёҚйҳ»еЎһеҗҺз»ӯжӯҘйӘӨиҝҗиЎҢ
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="clang" LD="ld.lld" OBJCOPY="llvm-objcopy" O=out gki_defconfig &&
          export CC="$(pwd)/cc-wrapper" && export LD="$(pwd)/ld-wrapper" &&
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" OBJCOPY="llvm-objcopy" O=out Image
          
          # зј–иҜ‘еҗҺж—¶й—ҙеҠ«жҢҒдәҢж¬Ўж ЎйӘҢ
          echo "--- зј–иҜ‘еҗҺзҺҜеўғж—¶й—ҙ: $(LD_PRELOAD=$PRELOAD_LIBS date) ---"
          echo "--- зј–иҜ‘еҗҺзҺҜеўғж–Үд»¶ж—¶й—ҙжҲі: ---"
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          echo "еҶ…ж ёзј–иҜ‘е®ҢжҲҗпјҒ"
          if [[ "${{ github.event.inputs.ccache_debug }}" == "true" ]]; then
            echo "жӯЈеңЁжү“еҢ…ccacheж—Ҙеҝ—еҸҠи°ғиҜ•дҝЎжҒҜ..."
            cd ..
            cp ./common/out/vmlinux.symvers ./vmlinux.symvers
            cp ./common/out/.config ./config
            zip -r9 debug.zip ccache.log config vmlinux.symvers
          fi
          echo "ccacheзҠ¶жҖҒпјҡ"
          ccache -s
          echo "зј–иҜ‘еҗҺз©әй—ҙ:"
          df -h

      - name: дҝқеӯҳж–°зҡ„ ccache зј“еӯҳ
        if: inputs.ccache_update || steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
         
      - name: еә”з”ЁKPMе№¶дҝ®иЎҘеҶ…ж ё
        run: |
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' && ( "${{ github.event.inputs.ksu_type }}" == "sukisu" || "${{ github.event.inputs.ksu_type }}" == "resukisu" ) ]]; then
            echo "жӯЈеңЁеә”з”ЁKPMе№¶дҝ®иЎҘеҶ…ж ё..."
            cd kernel_workspace/common/out/arch/arm64/boot
            curl -LO https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/latest/download/patch_linux
            chmod +x patch_linux
            ./patch_linux
            rm -f Image
            mv oImage Image
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'kpn' ]]; then
            echo "жӯЈеңЁеә”з”ЁKP-Nе№¶дҝ®иЎҘеҶ…ж ё..."
            cd kernel_workspace/common/out/arch/arm64/boot
            wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kptools-linux
            wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kpimg-linux
            chmod +x ./kptools-linux
            ./kptools-linux -p -i ./Image -k ./kpimg-linux -o ./oImage
            rm -f Image
            mv oImage Image
          fi
          
      - name: е…ӢйҡҶ AnyKernel3 е№¶жү“еҢ…
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/Seria-Kernel-Builds/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "жңӘжүҫеҲ°еҶ…ж ёй•ңеғҸж–Үд»¶пјҢжһ„е»әеҸҜиғҪеҮәй”ҷ"
            exit 1
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KSUNext"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="none"
          fi
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            wget https://raw.githubusercontent.com/$GITHUB_REPOSITORY/refs/heads/$GITHUB_REF_NAME/zram.zip
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'kpn' ]]; then
            wget https://github.com/Seria-Kernel-Builds/KPatch-Next/releases/latest/download/kpn.zip
          fi
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ github.event.inputs.kernel_suffix }}.zip
          else
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ env.KERNEL_NAME }}.zip
          fi
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT
          
          #дёәAK3ж·»еҠ жіЁйҮҠпјҲи°ғиҜ•дҝЎжҒҜпјү
          CLEAN_SUB_VERSION="${{ env.SUB_VERSION }}"
          CLEAN_SUB_VERSION="${CLEAN_SUB_VERSION%_mtk}"
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ github.event.inputs.kernel_suffix }}
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ env.KERNEL_NAME }}
          fi
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log
          echo "KSU Branch: ${KSU_TYPENAME}" >> ./ak3.log
          echo "KSU Ver: ${KSUVER}" >> ./ak3.log
          echo "susfs: ${{ github.event.inputs.susfs_enable }}" >> ./ak3.log
          echo "KPM: ${{ github.event.inputs.kpm_enable }}" >> ./ak3.log
          echo "LZ4: ${{ github.event.inputs.lz4_enable }}" >> ./ak3.log
          echo "LZ4KD: ${{ github.event.inputs.lz4kd_enable }}" >> ./ak3.log
          echo "IPset: ${{ github.event.inputs.better_net }}" >> ./ak3.log
          echo "BBR&Brutal: ${{ github.event.inputs.bbr_enable }}" >> ./ak3.log
          echo "ADIOS: ${{ github.event.inputs.adios_enable }}" >> ./ak3.log
          echo "Re-Kernel: ${{ github.event.inputs.rekernel_enable }}" >> ./ak3.log
          echo "BBG: ${{ github.event.inputs.baseband_guard }}" >> ./ak3.log
          zip -z ../$AK3_NAME < ./ak3.log

      - name: дёҠдј  Ccache и°ғиҜ•ж—Ҙеҝ—
        if: always() && inputs.ccache_debug
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/kernel_workspace/debug.zip
          archive: false

      - name: дёҠдј  ZIP е·Ҙд»¶
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip
          archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      
    steps:
      - name: дёӢиҪҪ ZIP е·Ҙд»¶
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips
          skip-decompress: true

      - name: и®ҫзҪ®зҺҜеўғеҸҳйҮҸ
        run: |
          CLEAN_SUB_VERSION="${{ env.SUB_VERSION }}"
          CLEAN_SUB_VERSION="${CLEAN_SUB_VERSION%_mtk}"
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ github.event.inputs.kernel_suffix }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ env.KERNEL_NAME }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          fi
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU Ultra"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KernelSU Next"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="ж— еҶ…зҪ®KSU"
          fi
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV
         
      - name: еҲӣе»әеҸ‘еёғ
        id: create_release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: "${{ env.TAG_HEAD }}-${{ env.TIME }}"
          name: "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}"
          body: |
            ### рҹ“ұ ж¬§еҠ зңҹзұі ${{ env.KSU_TYPENAME }} sm8850 йҖҡз”ЁеҶ…ж ё | жһ„е»әдҝЎжҒҜ
            - еҶ…ж ёзүҲжң¬еҸ·: ${{ env.FULL_VERSION }}
            - зј–иҜ‘ж—¶й—ҙ: ${{ env.TIME_FORM }}
            - жңәеһӢпјҡж¬§еҠ зңҹйӘҒйҫҷ8E Gen5йҖҡз”Ё ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }} еҶ…ж ёпјҲеҹәдәҺ AOSP е®ҳж–№ android16-6.12-2025-06 жәҗз ҒеҲҶж”Ҝпјү
            - KSUеҲҶж”Ҝпјҡ${{ env.KSU_TYPENAME }}
            - susfsж”ҜжҢҒпјҡ${{ github.event.inputs.susfs_enable }}
            - KPMж”ҜжҢҒ пјҡ${{ github.event.inputs.kpm_enable }}
            - LZ4ж”ҜжҢҒпјҡ${{ github.event.inputs.lz4_enable }}
            - LZ4KDж”ҜжҢҒпјҡ${{ github.event.inputs.lz4kd_enable }}
            - зҪ‘з»ңеҠҹиғҪеўһејәпјҡ${{ github.event.inputs.better_net }}
            - BBR/Brutal зӯүжӢҘеЎһжҺ§еҲ¶з®—жі•ж”ҜжҢҒпјҡ${{ github.event.inputs.bbr_enable }}
            - ADIOS IOи°ғеәҰеҷЁж”ҜжҢҒпјҡ${{ github.event.inputs.adios_enable }}
            - Re-Kernelж”ҜжҢҒпјҡ${{ github.event.inputs.rekernel_enable }}
            - еҶ…ж ёзә§еҹәеёҰдҝқжҠӨж”ҜжҢҒпјҡ${{ github.event.inputs.baseband_guard }}
            - SukiSU Ultraз®ЎзҗҶеҷЁдёӢиҪҪпјҡ[SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases)
            - KernelSU Nextз®ЎзҗҶеҷЁдёӢиҪҪпјҡ[KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next/releases)
            - KSUеҺҹзүҲз®ЎзҗҶеҷЁдёӢиҪҪпјҡ[KernelSU](https://github.com/tiann/KernelSU/releases)
            ### вҸ«пёҸ жӣҙж–°еҶ…е®№пјҡ
            - жӣҙж–°${{ env.KSU_TYPENAME }}иҮіжңҖж–°зүҲжң¬пјҲ${{ needs.build.outputs.ksuver }}пјү
            - (йў„з•ҷ)
            ### рҹ“Ӣ е®үиЈ…ж–№жі• | Installation Guide
            1. иӢҘдҪ зҡ„жүӢжңәе·Із»Ҹе®үиЈ…дәҶз¬¬дёүж–№RecoveryпјҲеҰӮTWRP)пјҢеҸҜдёӢиҪҪеҜ№еә”жңәеһӢзҡ„AnyKernelеҲ·жңәеҢ…еҗҺиҝӣе…ҘRecoveryжЁЎејҸпјҢйҖҡиҝҮRecoveryеҲ·е…ҘеҲ·жңәеҢ…еҗҺйҮҚеҗҜи®ҫеӨҮпјӣ
            2. иӢҘдҪ зҡ„жүӢжңәд№ӢеүҚе·Іжңү root жқғйҷҗпјҢеҸҜеңЁжүӢжңәдёҠе®үиЈ…[HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher/releases)пјҢеңЁHorizonKernelFlasherдёӯеҲ·е…ҘAnyKernelеҲ·жңәеҢ…е№¶йҮҚеҗҜпјӣ
            3. иӢҘдҪ д№ӢеүҚе·ІеҲ·е…ҘSukiSU UltraеҶ…ж ёпјҢдё”SukiSU Ultraз®ЎзҗҶеҷЁе·Іжӣҙж–°иҮіжңҖж–°зүҲжң¬пјҢеҸҜеңЁSukiSU Ultraз®ЎзҗҶеҷЁдёӯзӣҙжҺҘеҲ·е…ҘAnyKernelеҲ·жңәеҢ…е№¶йҮҚеҗҜпјӣ
            4. еҲ·е…Ҙж— lz4kdиЎҘдёҒзүҲзҡ„еҶ…ж ёеүҚиӢҘеҲ·е…ҘиҝҮlz4kdиЎҘдёҒзүҲзҡ„еҶ…ж ёпјҢдёәйҒҝе…ҚеҮәй”ҷпјҢиҜ·е…Ҳе…ій—ӯzramжЁЎеқ—пјӣ
            5. з”ұдәҺKernelSUдёҠжёёжӣҙж–°дәҶе…ғжЁЎеқ—еҠҹиғҪпјҢжңҖж–°зүҲKSUз®ЎзҗҶеҷЁпјҲеҢ…жӢ¬йҷӨKernelSU Nextд»ҘеӨ–зҡ„еҗ„еҲҶж”ҜпјүйңҖиҰҒй…ҚеҗҲе…ғжЁЎеқ—(metamodule)жүҚиғҪжӯЈеёёжҢӮиҪҪжЁЎеқ—гҖӮзӣ®еүҚзҡ„е…ғжЁЎеқ—еҢ…жӢ¬[meta overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs), [mountify](https://github.com/backslashxx/mountify), [meta magicmount](https://github.com/7a72/meta-magic_mount/), [meta magicmount rs](https://github.com/Tools-cx-app/meta-magic_mount/), [hybrid mount](https://github.com/YuzakiKokuban/meta-hybrid_mount)зӯүгҖӮиӢҘдҪ жҳҜз¬¬дёҖж¬ЎдҪҝз”ЁKSUжҲ–еҲҡд»Һж—§зүҲKSUз®ЎзҗҶеҷЁеҚҮзә§иҮіж–°зүҲпјҢиҜ·е…Ҳе®үиЈ…дёҖдёӘе…ғжЁЎеқ—пјҢиҝҷж ·е…¶д»–ж¶үеҸҠзі»з»ҹжҢӮиҪҪзҡ„жЁЎеқ—жүҚиғҪжӯЈеёёиҝҗиЎҢпјӣ
            6. KernelPatch NextпјҲеҚіKPNпјүжҳҜдёҖдёӘзӢ¬з«ӢдәҺKSUзҡ„KPMе®һзҺ°пјҢеҸҜд»ҘиҝҗиЎҢеңЁд»»ж„ҸKSU/йқўе…·зҺҜеўғдёӯпјҲдёҚйҖӮз”ЁдәҺApatchпјүпјҢдё”дёҚиғҪдёҺ(Re)SukiSUеҶ…зҪ®зҡ„kpmеҠҹиғҪе…ұеҗҢдҪҝз”ЁпјҢдҪҝз”ЁеүҚиҜ·дҝқиҜҒдҪ зҡ„еҶ…ж ёжІЎжңүеҶ…зҪ®зҡ„kpmе®һзҺ°/дҝ®иЎҘгҖӮ
            #### вҖ»вҖ»вҖ»еҲ·еҶҷеҶ…ж ёжңүйЈҺйҷ©пјҢдёәйҳІжӯўеҮәзҺ°ж„ҸеӨ–еҜјиҮҙжүӢжңәеҸҳз –пјҢеңЁеҲ·е…ҘеҶ…ж ёеүҚиҜ·еҠЎеҝ…з”Ё[KernelFlasher](https://github.com/capntrips/KernelFlasher)зӯүиҪҜд»¶еӨҮд»Ҫbootзӯүе…ій”®еҗҜеҠЁеҲҶеҢә!вҖ»вҖ»вҖ»
