name: Xiaomi17зі» 6.12.23 GKIеҶ…ж ё

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android16'
  KERNEL_VERSION: '6.12'
  SUB_VERSION: '23_gki'
  KERNEL_NAME: 'android16-5-g75e9b1c7ae7c-abogki463945075-4k'
  CCACHE_KEY: ccache-neov5-gki-6.12.23

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSUеҲҶж”Ҝ(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(еҺҹзүҲ)/ж— еҶ…зҪ®KSU,й»ҳи®ӨReSukiSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: 'жҳҜеҗҰејҖеҗҜsusfs(з”ЁдәҺеўһејәйҡҗи—ҸзҺҜеўғжҢӮиҪҪеҠҹиғҪ; еҸҜиғҪиҪ»еҫ®еўһеҠ иҖ—з”өпјҢдёҠжёёжӣҙж–°еҜјиҮҙдёҚзЁіе®ҡж—¶жҲ–дёҚйңҖиҰҒеҸҜе…ій—ӯ)'
        required: true
        type: boolean
        default: 'true'
      kpm_enable:
        description: 'жҳҜеҗҰејҖеҗҜkpm(builtin-дҪҝз”Ё(re)sukisuеҶ…зҪ®kpm, kpn-дҪҝз”ЁзӢ¬з«Ӣkpmе®һзҺ°(ж”ҜжҢҒд»»ж„ҸKSU/йқўе…·зҺҜеўғ); дёҚйңҖиҰҒеҸҜдҝқжҢҒй»ҳи®Өе…ій—ӯ)'
        required: true
        type: choice
        default: 'builtin'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: 'жҳҜеҗҰе®үиЈ… lz4 1.10.0+zstd 1.5.7 иЎҘдёҒеҸҠ LZ4KD иЎҘдёҒ'
        required: true
        type: boolean
        default: 'true'
      lz4kd_enable:
        description: 'жҳҜеҗҰе®үиЈ… LZ4KD иЎҘдёҒ(иӢҘе·ІејҖеҗҜlz4+zstdиЎҘдёҒеҲҷеҸҜдёҚејҖеҗҜ)'
        required: true
        type: boolean
        default: 'false'
      bbr_enable:
        description: "жҳҜеҗҰеҗҜз”Ёbbrз®—жі•(дјҳеҢ–дёҠиЎҢж•°жҚ®,еҜ№жүӢжңәж—Ҙз”Ёж— еӨӘеӨ§ж„Ҹд№үз”ҡиҮіеҸҜиғҪиҙҹдјҳеҢ–;falseе…ій—ӯ,trueд»…еҠ е…Ҙз®—жі•,defaultеҗҜз”Ёз®—жі•е№¶и®ҫдёәй»ҳи®Ө)"
        required: true
        type: choice
        default: 'true'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: 'жҳҜеҗҰејҖеҗҜзҪ‘з»ңеҠҹиғҪжӢ“еұ•й…ҚзҪ®(з”ЁдәҺдёәipsetеҸҠйңҖиҰҒiptablesзӯүй«ҳзә§зҪ‘з»ңеҠҹиғҪеҶ…ж ёж”ҜжҢҒзҡ„зЁӢеәҸжҸҗдҫӣж”ҜжҢҒ)'
        required: true
        type: boolean
        default: 'true'
      adios_enable:
        description: 'жҳҜеҗҰеҗҜз”ЁADIOS IOи°ғеәҰеҷЁж”ҜжҢҒ(жҸҗеҚҮIOиҜ»еҶҷжҖ§иғҪ)'
        required: true
        type: boolean
        default: 'true'
      rekernel_enable:
        description: 'жҳҜеҗҰеҗҜз”ЁRe-Kernelж”ҜжҢҒ(дёҺFreezer/NoActiveзӯүиҪҜд»¶й…ҚеҗҲ, жҸҗеҚҮеә”з”ЁеҶ»з»“иғҪеҠӣ)'
        required: true
        type: boolean
        default: 'false'
      baseband_guard:
        description: 'жҳҜеҗҰејҖеҗҜеҶ…ж ёзә§еҹәеёҰдҝқжҠӨ(йҳ»жӯўдёҖеҲҮеҜ№йқһз”ЁжҲ·еҲҶеҢәзҡ„еҶҷе…ҘпјҢжңүж•ҲйҳІжӯўж јжңә)'
        required: true
        type: boolean
        default: 'true'
      ccache_update:
        description: 'жӣҙж–°ccacheзј“еӯҳ(е°Ҷжң¬ж¬Ўзј–иҜ‘з”ҹжҲҗзҡ„ccacheзј“еӯҳиҰҶзӣ–иҮід»“еә“зј“еӯҳпјҢеңЁжӣҙж”№зј–иҜ‘й…ҚзҪ®гҖҒжәҗз ҒжҲ–йңҖиҰҒеҲ·ж–°зј“еӯҳж—¶ејҖеҗҜ)'
        required: true
        type: boolean
        default: 'false'
      ccache_debug:
        description: 'жҳҜеҗҰдёҠдј  Ccacheи°ғиҜ•ж—Ҙеҝ—(з”ЁдәҺи°ғиҜ•, ж— йңҖиҰҒдёҚеҝ…ејҖеҗҜ)'
        required: true
        type: boolean
        default: 'false'
      kernel_suffix:
        description: 'еҶ…ж ёеҗҺзјҖ(з•ҷз©әй»ҳи®Ө,ејҖеӨҙеҲ«еҠ иҝһеӯ—з¬Ұ,еӢҝеҠ з©әж јзӯүеҪұе“ҚжҢҮд»ӨиҝҗиЎҢзҡ„дҝқз•ҷеӯ—з¬Ұ)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: е®үиЈ…зҺҜеўғдҫқиө–+еҲқе§ӢеҢ–жәҗз Ғд»“еә“еҸҠllvm-clang19е·Ҙе…·й“ҫ
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "еҪ“еүҚд»“еә“пјҡ$GITHUB_REPOSITORY"
          echo "еҪ“еүҚеҲҶж”Ҝпјҡ$GITHUB_REF_NAME"
          
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev libdw-dev &
          #ж—§зүҲе®Ңж•ҙжҢҮд»ӨпјҡпјҲз”ұдәҺз»ҸиҝҮйӘҢиҜҒеӨ§йғЁеҲҶжҢҮд»Өе·ІеҶ…зҪ®дәҺGitHub ActionзҺҜеўғдёӯпјҢж•…иҝӣиЎҢзІҫз®Җпјү
          #sudo apt-get install -y --no-install-recommends curl bison flex make binutils git perl gcc python3 python-is-python3 bc libssl-dev libelf-dev libdw-dev zip unzip ccache
          
          #дҪҝз”ЁжңҖж–°зүҲccache v4.12.2пјҲUbuntuиҪҜд»¶д»“еә“зҡ„зүҲжң¬е№¶йқһжңҖж–°пјү
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/ccache-x86-64 -O ccache &&
          sudo cp -f ./ccache /usr/bin/ccache &&
          sudo chmod +x /usr/bin/ccache &&
          rm -f ./ccache &
          
          echo "жӯЈеңЁе…ӢйҡҶжәҗз Ғд»“еә“..."
          aria2c -s16 -x16 -k1M https://github.com/Seria-Kernel-Builds/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip -o common.zip && 
          unzip -q common.zip && 
          mv "android_gki_kernel_common-android16-6.12-2025-06" common &&
          rm -rf common.zip &
          
          echo "жӯЈеңЁе…ӢйҡҶllvm-clang19е·Ҙе…·й“ҫ..." &&
          mkdir -p clang19 &&
          aria2c -s16 -x16 -k1M https://github.com/Seria-Kernel-Builds/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip &&
          unzip -q clang.zip -d clang19 &&
          rm -rf clang.zip &
          
          echo "жӯЈеңЁе…ӢйҡҶRust 1.82.0е·Ҙе…·й“ҫ..." &&
          mkdir -p rust &&
          aria2c -s16 -x16 -k1M https://github.com/Seria-Kernel-Builds/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/rust.zip -o rust.zip &&
          unzip -q rust.zip -d rust &&
          rm -rf rust.zip &
          
          echo "жӯЈеңЁе…ӢйҡҶжһ„е»әе·Ҙе…·..." &&
          aria2c -s16 -x16 -k1M https://github.com/Seria-Kernel-Builds/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip -o build-tools.zip &&
          unzip -q build-tools.zip &&
          rm -rf build-tools.zip &
          
          wait
          echo "жүҖжңүжәҗз ҒеҸҠllvm-clang19е·Ҙе…·й“ҫеҲқе§ӢеҢ–е®ҢжҲҗпјҒ"
          echo "жӯЈеңЁеҺ»йҷӨ dirty еҗҺзјҖ..."
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: й…ҚзҪ®ccacheзӣ®еҪ•
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
          echo "еҪ“еүҚзЈҒзӣҳз©әй—ҙпјҡ"
          df -h
          echo "еҪ“еүҚжһ„е»әеҶ…ж ёзүҲжң¬пјҡ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}"

      - name: иҪҪе…ҘеҪ“еүҚзүҲжң¬еҶ…ж ёзҡ„ ccacheзј“еӯҳ
        uses: actions/cache@v5
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_KEY }}-

      - name: жӢүеҸ–е…¬е…ұйў„зҪ® ccache зј“еӯҳ
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "жЈҖжҹҘжң¬ең°зј“еӯҳзҠ¶жҖҒ..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "жЈҖжөӢеҲ°жң¬ең°е·ІжҲҗеҠҹиҪҪе…Ҙ ccache зј“еӯҳпјҢи·іиҝҮе…¬е…ұ ccache жӢүеҸ–пјҒ"
            exit 0
          fi
          
          echo "жңӘе‘Ҫдёӯзј“еӯҳпјҢе°қиҜ•жӢүеҸ–жңҖж–°е…¬е…ұ ccache ..."
          mkdir -p ${{ env.CCACHE_DIR }}
          FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}.tar.zst"
          
          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "жҲҗеҠҹдёӢиҪҪ $FILE_NAMEпјҢжӯЈеңЁи§ЈеҺӢ..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "е…¬е…ұ ccache жҒўеӨҚе®ҢжҲҗпјҒ"
          else
            echo "е…¬е…ұ ccache дёӯжңӘжүҫеҲ°еҜ№еә”зҡ„ ccache ж–Үд»¶пјҢе°ҶиҝӣиЎҢе…ЁйҮҸе…Ёж–°зј–иҜ‘..."
          fi

      - name: жё…йҷӨж—§ ccache зј“еӯҳ
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "жӯЈеңЁжё…йҷӨд»“еә“дёӯзҡ„ж—§ ccache зј“еӯҳ..."
          if gh cache delete ${{ env.CCACHE_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "жҲҗеҠҹеҲ йҷӨж—§зҡ„ ccache зј“еӯҳпјҒ"
          else
            echo "ж—§зј“еӯҳдёҚеӯҳеңЁжҲ–е·Іиў«жё…зҗҶпјҒ"
          fi
      
      - name: еҲқе§ӢеҢ–е№¶й…ҚзҪ®ccache
        run: |
          # и®ҫзҪ®ccacheзҺҜеўғеҸҳйҮҸ
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          # зЎ®дҝқccacheзӣ®еҪ•еӯҳеңЁ
          mkdir -p "$CCACHE_DIR"
          
          # жҜҸж¬ЎиҝҗиЎҢйғҪйҮҚж–°й…ҚзҪ®зј“еӯҳеӨ§е°Ҹ
          echo "й…ҚзҪ®ccacheзј“еӯҳеӨ§е°Ҹдёә: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          # жҳҫзӨәеҲқе§Ӣзј“еӯҳзҠ¶жҖҒ
          echo "ccacheеҲқе§ӢзҠ¶жҖҒ:"
          ccache -s
          
          # еҰӮжһңзј“еӯҳжҒўеӨҚе‘ҪдёӯпјҢжҳҫзӨәиҜҰз»ҶдҝЎжҒҜ
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "ccacheзј“еӯҳе‘ҪдёӯиҜҰжғ…:"
            ccache -sv
          fi

      - name: ж·»еҠ KernelSU
        id: ksu_version
        run: |
          # иҝӣе…ҘеҶ…ж ёе·ҘдҪңзӣ®еҪ•
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            echo "жӯЈеңЁй…ҚзҪ®SukiSU Ultra..."
            curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/refs/heads/main/kernel/setup.sh" | bash -s builtin
            cd ./KernelSU
            # иҺ·еҸ–еҪ“еүҚ Git жҸҗдәӨзҡ„зҹӯе“ҲеёҢ (8дҪҚ)
            GIT_COMMIT_HASH=$(git rev-parse --short=8 HEAD)
            echo "еҪ“еүҚжҸҗдәӨе“ҲеёҢ: $GIT_COMMIT_HASH"
            export KSU_VERSION=$KSU_VERSION
            # е°қиҜ•жңҖеӨҡ 3 ж¬ЎиҺ·еҸ– KernelSU API зүҲжң¬еҸ·
            for i in {1..3}; do
              # д»ҺиҝңзЁӢ Kbuild дёӯжҸҗеҸ– KSU_API_VERSION
              KSU_API_VERSION=$(curl -s "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/Kbuild" | 
                # жҹҘжүҫз¬¬дёҖдёӘеҢ…еҗ«зүҲжң¬е®ҡд№үзҡ„иЎҢ
                grep -m1 "KSU_VERSION_API :=" | 
                # жҸҗеҸ–зӯүеҸ·еҗҺзҡ„еҖј
                awk -F'= ' '{print $2}' | 
                # еҲ йҷӨжүҖжңүз©әзҷҪеӯ—з¬Ұ
                tr -d '[:space:]')
              # еҰӮжһңжҲҗеҠҹиҺ·еҸ–еҲ°зүҲжң¬еҸ·еҲҷи·іеҮәеҫӘзҺҜпјҢеҗҰеҲҷзӯүеҫ… 1 з§’еҗҺйҮҚиҜ•
              [ -n "$KSU_API_VERSION" ] && break || sleep 1
            done
            # еҰӮжһңиҺ·еҸ–еӨұиҙҘпјҢдҪҝз”Ёй»ҳи®ӨзүҲжң¬еҸ· 3.1.7
            [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"
            # е°Ҷ API зүҲжң¬еҸ·еӯҳеӮЁеҲ° GitHub зҺҜеўғеҸҳйҮҸ
            echo "KSU_API_VERSION=$KSU_API_VERSION" >> $GITHUB_ENV
            # еҲӣе»әзүҲжң¬е®ҡд№үжЁЎжқҝ&зүҲжң¬ж јејҸеҮҪж•°: дҪҝз”ЁиҺ·еҸ–зҡ„жҸҗдәӨе“ҲеёҢе’Ңеӣәе®ҡеҗҺзјҖ
            # KSU_VERSION_API: API зүҲжң¬е®ҡд№ү
            # KSU_VERSION_FULL: е®Ңж•ҙзүҲжң¬е®ҡд№ү
            VERSION_DEFINITIONS=$'define get_ksu_version_full\nv\\$1-'"$GIT_COMMIT_HASH"$'@SeriaTvT\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := v'"$KSU_API_VERSION"$'-'"$GIT_COMMIT_HASH"$'@SeriaTvT'
            # жё…зҗҶеҶ…ж ё Kbuild дёӯзҡ„ж—§зүҲжң¬е®ҡд№ү
            # еҲ йҷӨзүҲжң¬еҮҪж•°
            sed -i '/define get_ksu_version_full/,/endef/d' kernel/Kbuild
            # еҲ йҷӨ API зүҲжң¬е®ҡд№ү
            sed -i '/KSU_VERSION_API :=/d' kernel/Kbuild
            # еҲ йҷӨе®Ңж•ҙзүҲжң¬е®ҡд№ү
            sed -i '/KSU_VERSION_FULL :=/d' kernel/Kbuild
            # еңЁ REPO_OWNER иЎҢеҗҺжҸ’е…Ҙж–°зүҲжң¬е®ҡд№ү
            awk -v def="$VERSION_DEFINITIONS" '
              # еҪ“жүҫеҲ° REPO_OWNER иЎҢж—¶пјҢжҸ’е…ҘзүҲжң¬е®ҡд№үе№¶и®ҫзҪ®ж Үи®°
              /REPO_OWNER :=/ {print; print def; inserted=1; next}
              # жү“еҚ°жүҖжңүиЎҢ
              1
              # еҰӮжһңжңӘжүҫеҲ°жҸ’е…ҘзӮ№пјҢеңЁж–Үд»¶жң«е°ҫиҝҪеҠ 
              END {if (!inserted) print def}
            ' kernel/Kbuild > kernel/Kbuild.tmp && mv kernel/Kbuild.tmp kernel/Kbuild

            # з”ҹжҲҗиҮӘе®ҡд№үзүҲжң¬еҸ·пјҲеҹәдәҺжҸҗдәӨи®Ўж•°пјү, еӨұиҙҘж—¶дҪҝз”Ё 114514
            KSU_VERSION=$(expr $(git rev-list --count main) + 37185 2>/dev/null || echo 114514)
            # еӯҳеӮЁзүҲжң¬еҸ·еҲ° GitHub зҺҜеўғеҸҳйҮҸ
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT

            # йӘҢиҜҒдҝ®ж”№з»“жһң
            grep -A10 "REPO_OWNER" kernel/Kbuild  # жЈҖжҹҘжҸ’е…ҘзӮ№еҗҺзҡ„еҶ…е®№
            grep "KSU_VERSION_FULL" kernel/Kbuild # зЎ®и®ӨзүҲжң¬е®ҡд№үеӯҳеңЁ
            echo "SukiSUзүҲжң¬еҸ·: v${KSU_API_VERSION}-${GIT_COMMIT_HASH}@SeriaTvT"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            echo "жӯЈеңЁй…ҚзҪ®ReSukiSU..."
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@SeriaTvT"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            # з”ҹжҲҗиҮӘе®ҡд№үзүҲжң¬еҸ·пјҲеҹәдәҺжҸҗдәӨи®Ўж•°пјү, еӨұиҙҘж—¶дҪҝз”Ё 114514
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
            # еӯҳеӮЁзүҲжң¬еҸ·еҲ° GitHub зҺҜеўғеҸҳйҮҸ
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            echo "жӯЈеңЁй…ҚзҪ®KernelSU Next..."
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            cd KernelSU-Next
            rm -rf .git
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=dev&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" kernel/Kbuild
            KSU_GIT_TAG=$(curl -sL "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/tags" | grep -o '"name": *"[^"]*"' | head -n 1 | sed 's/"name": "//;s/"//')
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" kernel/Kbuild
            #дёәKernelSU Nextж·»еҠ WildKSUз®ЎзҗҶеҷЁж”ҜжҢҒ
            cd ../common/drivers/kernelsu
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/apk_sign.patch
            patch -p2 -N -F 3 < apk_sign.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "жӯЈеңЁй…ҚзҪ®еҺҹзүҲ KernelSU (tiann/KernelSU)..."
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          else
            echo "е·ІйҖүжӢ©ж— еҶ…зҪ®KernelSUжЁЎејҸпјҢи·іиҝҮKernelSUй…ҚзҪ®..."
          fi

      - name: еә”з”Ё KernelSU & SUSFS иЎҘдёҒ
